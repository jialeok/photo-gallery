name: Unzip photo-gallery.zip and commit

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  unzip_and_commit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: sudo apt-get install -y unzip
      - run: |
          unzip -o photo-gallery.zip -d extracted
          cp -a extracted/photo-gallery/. .
      - run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Unpack zip"
          git push
